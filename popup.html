<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabTimer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo-title">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="13" r="9" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.5"/>
          <circle cx="12" cy="13" r="7" fill="white"/>
          <line x1="12" y1="13" x2="12" y2="7.5" stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="13" x2="15.5" y2="15" stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="13" r="1.2" fill="#4f46e5"/>
          <rect x="10" y="2" width="4" height="2.5" rx="1" fill="white"/>
          <rect x="9" y="1.5" width="6" height="2" rx="1" fill="rgba(255,255,255,0.7)"/>
        </svg>
        TabTimer
      </div>
      <span class="tab-count-badge" id="tabCountBadge">— tabs</span>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat red">
        <div class="stat-value" id="statForgotten">0</div>
        <div class="stat-label">Forgotten</div>
      </div>
      <div class="stat orange">
        <div class="stat-value" id="statAging">0</div>
        <div class="stat-label">Aging</div>
      </div>
      <div class="stat yellow">
        <div class="stat-value" id="statModerate">0</div>
        <div class="stat-label">Moderate</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statFresh">0</div>
        <div class="stat-label">Fresh</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Filter by title or URL…" autocomplete="off">
    </div>
    <button class="sort-btn" id="sortBtn" title="Toggle sort order">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span id="sortLabel">Oldest First</span>
    </button>
  </div>

  <!-- AI status banner -->
  <div class="ai-banner" id="aiBanner" hidden></div>

  <!-- Tab list -->
  <div class="tab-list" id="tabList">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p>Loading tabs…</p>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-row">
      <button class="close-old-btn" id="closeOldBtn" disabled>
        Close Forgotten Tabs (&gt;24h)
      </button>
      <button class="refresh-btn" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
        </svg>
      </button>
    </div>
    <button class="ai-group-btn" id="aiGroupBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
      </svg>
      Group Tabs by AI Topic
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
