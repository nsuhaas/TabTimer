<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TabTimer Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TabTimer Settings</h1>
    </div>

    <section class="section">
      <h2>AI Tab Grouping</h2>
      <p class="description">
        Enter your Anthropic API key to enable AI-powered tab grouping. Tabs will be
        analyzed by Claude and automatically organized into labeled color-coded groups.
      </p>

      <div class="field">
        <label for="apiKey">Anthropic API Key</label>
        <div class="input-wrap">
          <input
            type="password"
            id="apiKey"
            placeholder="sk-ant-..."
            autocomplete="off"
            spellcheck="false"
          >
          <button class="toggle-btn" id="toggleKey" title="Show / hide key">
            <svg id="eyeShow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeHide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <p class="hint">
          Get your key at
          <a href="https://console.anthropic.com/account/keys" target="_blank">console.anthropic.com</a>.
          The key is stored locally in your browser only.
        </p>
      </div>

      <div class="actions">
        <button class="save-btn" id="saveBtn">Save</button>
        <button class="clear-btn" id="clearBtn">Remove Key</button>
        <span class="status" id="status"></span>
      </div>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
